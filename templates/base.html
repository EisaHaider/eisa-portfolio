<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Eisa Haider
        {% endblock %}
    </title>

    <meta name="description"
          content="Eisa Haider">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/output.css') }}">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>

        :root {

            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #111827;

            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;

            --border-color: #334155;
            
            /* ألوان النمط الداكن: الشبكة والتدرجات الخلفية */
            --grid-color: rgba(255, 255, 255, 0.05);
            --gradient-glow-1: rgba(14, 165, 233, 0.18);
            --gradient-glow-2: rgba(59, 130, 246, 0.12);

        }

        html.light {

            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;

            --text-primary: #0f172a;
            --text-secondary: #475569;

            --border-color: #cbd5e1;
            
            /* ألوان النمط الفاتح: شبكة داكنة خفيفة وتدرجات ناعمة مريحة للعين */
            --grid-color: rgba(0, 0, 0, 0.04);
            --gradient-glow-1: rgba(14, 165, 233, 0.06);
            --gradient-glow-2: rgba(59, 130, 246, 0.04);

        }

        html {
            scroll-behavior: smooth;
        }

        body {

            background:

                radial-gradient(
                    circle at top right,
                    var(--gradient-glow-1),
                    transparent 35%
                ),

                radial-gradient(
                    circle at bottom left,
                    var(--gradient-glow-2),
                    transparent 40%
                ),

                var(--bg-primary);

            color: var(--text-primary);

            transition:
                background-color .3s ease,
                color .3s ease;

            font-family: "Manrope", sans-serif;

        }

        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background-image:

                linear-gradient(
                    var(--grid-color) 1px,
                    transparent 1px
                ),

                linear-gradient(
                    90deg,
                    var(--grid-color) 1px,
                    transparent 1px
                );

            background-size: 40px 40px;

            pointer-events: none;

            z-index: -1;

        }

        html[dir="rtl"] body {

            font-family:
                "IBM Plex Sans Arabic",
                sans-serif;

        }

        .container-custom {

            max-width: 1280px;
            margin: auto;

        }

        .card {

            background: var(--card-bg);

            border: 1px solid var(--border-color);

            border-radius: 24px;

            transition:
                transform .25s ease,
                box-shadow .25s ease,
                border-color .25s ease;

        }

        .card:hover {

            transform: translateY(-6px);

            border-color:
                rgba(59,130,246,.35);

            box-shadow:
                0 20px 40px rgba(0,0,0,.25);

        }

        .section-title {

            font-size: 2rem;
            font-weight: 700;

        }

        .section-spacing {

            padding-top: 6rem;
            padding-bottom: 6rem;

        }

        .fade-up {

            opacity: 0;
            transform: translateY(20px);

        }

        .fade-up.show {

            opacity: 1;
            transform: translateY(0);

            transition:
                opacity .6s ease,
                transform .6s ease;

        }

    </style>

</head>

<body>

    {% block content %}
    {% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
