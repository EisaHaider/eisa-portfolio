{% extends "base.html" %}

{% block title %}
Eisa Haider | Information Systems Architect
{% endblock %}

{% block content %}

<div class="min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur border-b"
         style="background:var(--bg-primary);border-color:var(--border-color);">

        <div class="container-custom px-6">

            <div class="flex items-center justify-between h-20">

                <a href="#" class="text-xl font-bold hover:opacity-80 transition-opacity">
                    Eisa Haider
                </a>

                <div class="hidden md:flex items-center gap-8">

                    <a href="#profile" data-i18n="nav_profile"></a>

                    <a href="#projects" data-i18n="nav_projects"></a>

                    <a href="#domains" data-i18n="nav_domains"></a>

                    <a href="#insights" data-i18n="nav_insights"></a>

                    <a href="#contact" data-i18n="nav_contact"></a>

                </div>

                <div class="flex items-center gap-3">

                    <button id="language-toggle" class="px-4 py-2 rounded-xl border" data-i18n="language_button">
                    </button>

                    <button id="theme-toggle" class="px-4 py-2 rounded-xl border">
                        ☀︎ / 🌙
                    </button>

                </div>

            </div>

        </div>

    </nav>

   <!-- Hero Section -->
<section class="relative overflow-hidden container-custom px-6 py-10 lg:py-0">

    <!-- خلفية زخرفية ناعمة -->
    <div class="pointer-events-none absolute inset-0 -z-10">
        <div class="absolute top-20 end-10 w-72 h-72 rounded-full bg-white/5 blur-3xl"></div>
        <div class="absolute bottom-10 start-10 w-64 h-64 rounded-full bg-cyan-400/10 blur-3xl"></div>
    </div>

    <div class="grid lg:grid-cols-2 gap-14 lg:gap-20 min-h-[85vh] items-center">

        <!-- الجانب الأيسر -->
        <div class="fade-up max-w-2xl">

            <p class="uppercase tracking-[0.28em] text-xs sm:text-sm opacity-55 mb-5" data-i18n="hero_title"></p>

            <h1 class="text-5xl sm:text-6xl lg:text-7xl font-bold tracking-tight mb-7 leading-[0.95]">
                Eisa Haider
            </h1>

            <p class="text-lg sm:text-xl max-w-xl opacity-75 leading-relaxed" data-i18n="hero_text"></p>

            <div class="flex gap-4 mt-10 flex-wrap">
                <a href="#profile"
                   data-i18n="btn_profile"
                   class="group inline-flex items-center justify-center px-7 py-3.5 rounded-lg bg-white text-slate-950 font-semibold shadow-lg shadow-black/10 hover:-translate-y-0.5 hover:shadow-xl transition-all">
                </a>

                <a href="#projects"
                   data-i18n="btn_projects"
                   class="inline-flex items-center justify-center px-7 py-3.5 rounded-lg border font-medium hover:bg-white/7 hover:-translate-y-0.5 transition-all"
                   style="border-color: var(--border-color);">
                </a>
            </div>

        </div>

        <!-- الجانب الأيمن -->
        <div class="fade-up">

            <div class="relative rounded-2xl border p-6 sm:p-8 bg-white/[0.035] backdrop-blur-xl shadow-2xl shadow-black/10"
                 style="border-color: var(--border-color);">

                <!-- إطار داخلي خفيف -->
                <div class="absolute inset-3 rounded-xl border opacity-40 pointer-events-none"
                     style="border-color: var(--border-color);"></div>

                <!-- العنوان -->
                <div class="relative mb-9 border-b pb-5" style="border-color: var(--border-color);">
                    <span class="text-[11px] uppercase tracking-[0.25em] opacity-45 block mb-2"
                          data-i18n="hero_flow_subtitle"></span>

                    <h2 class="text-2xl font-bold opacity-95 leading-tight"
                        data-i18n="hero_flow_title"></h2>
                </div>

                <!-- المراحل -->
                <div class="relative space-y-5">

                    <div class="absolute top-7 bottom-7 start-8 w-px opacity-20"
                         style="background-color: currentColor;"></div>

                    <!-- المرحلة الأولى -->
                    <div class="group relative z-10 flex items-start gap-5 rounded-xl p-3 -mx-3 hover:bg-white/[0.045] transition-colors">
                        <div class="shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center border bg-blue-500/10 text-blue-400 shadow-lg shadow-blue-950/10 group-hover:bg-blue-500/15 group-hover:scale-105 transition-all"
                             style="border-color: rgba(59,130,246,.28);">
                            <i data-lucide="search" class="w-6 h-6 opacity-90"></i>
                        </div>

                        <div class="pt-1.5">
                            <span class="text-[11px] font-bold uppercase tracking-[0.18em] opacity-50 block"
                                  data-i18n="hero_step1_title"></span>

                            <h3 class="text-base sm:text-lg font-semibold opacity-95 mt-1 leading-snug"
                                data-i18n="hero_step1_desc"></h3>
                        </div>
                    </div>

                    <!-- المرحلة الثانية -->
                    <div class="group relative z-10 flex items-start gap-5 rounded-xl p-3 -mx-3 hover:bg-white/[0.045] transition-colors">
                        <div class="shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center border bg-blue-500/10 text-blue-400 shadow-lg shadow-blue-950/10 group-hover:bg-blue-500/15 group-hover:scale-105 transition-all"
                             style="border-color: rgba(59,130,246,.28);">
                            <i data-lucide="layers" class="w-6 h-6 opacity-90"></i>
                        </div>

                        <div class="pt-1.5">
                            <span class="text-[11px] font-bold uppercase tracking-[0.18em] opacity-50 block"
                                  data-i18n="hero_step2_title"></span>

                            <h3 class="text-base sm:text-lg font-semibold opacity-95 mt-1 leading-snug"
                                data-i18n="hero_step2_desc"></h3>
                        </div>
                    </div>

                    <!-- المرحلة الثالثة -->
                    <div class="group relative z-10 flex items-start gap-5 rounded-xl p-3 -mx-3 hover:bg-white/[0.045] transition-colors">
                        <div class="shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center border bg-blue-500/10 text-blue-400 shadow-lg shadow-blue-950/10 group-hover:bg-blue-500/15 group-hover:scale-105 transition-all"
                             style="border-color: rgba(59,130,246,.28);">
                            <i data-lucide="shield-check" class="w-6 h-6 opacity-90"></i>
                        </div>

                        <div class="pt-1.5">
                            <span class="text-[11px] font-bold uppercase tracking-[0.18em] opacity-50 block"
                                  data-i18n="hero_step3_title"></span>

                            <h3 class="text-base sm:text-lg font-semibold opacity-95 mt-1 leading-snug"
                                data-i18n="hero_step3_desc"></h3>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

    <section id="profile" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-6" data-i18n="summary_title"></h2>
        
        <p class="text-lg opacity-70 max-w-3xl leading-relaxed mb-10" data-i18n="summary_description"></p>

        <div class="grid md:grid-cols-4 gap-6">

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_years_systems_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_years_systems_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_years_blog_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_years_blog_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_flask_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_flask_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_enterprise_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_enterprise_text"></div>
            </div>

        </div>

    </section>

    <section id="projects" class="container-custom px-6 section-spacing">

            <h2 class="section-title mb-10" data-i18n="projects_title"></h2>

            <div class="grid md:grid-cols-2 gap-6">

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_1_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_1_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_2_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_2_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_3_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_3_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_4_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_4_desc"></p>
                    </div>
                </div>

            </div>

        </section>

    <section id="domains" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-10" data-i18n="domains_title"></h2>

        <div class="grid md:grid-cols-3 gap-6">

            <div class="card p-8" data-i18n="domain_1"></div>

            <div class="card p-8" data-i18n="domain_4"></div>

            <div class="card p-8" data-i18n="domain_2"></div>

            <div class="card p-8" data-i18n="domain_5"></div>

            <div class="card p-8" data-i18n="domain_3"></div>

            <div class="card p-8" data-i18n="domain_6"></div>

        </div>

    </section>

    <section id="insights" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-10" data-i18n="insights_title"></h2>

        <div class="grid md:grid-cols-4 gap-6">

            <div class="card p-6" data-i18n="insight_1"></div>

            <div class="card p-6" data-i18n="insight_2"></div>

            <div class="card p-6" data-i18n="insight_3"></div>

            <div class="card p-6" data-i18n="insight_4"></div>

        </div>

    </section>


    
    <section id="contact" class="container-custom px-6 section-spacing">

        <div class="card p-10 md:p-12 max-w-4xl mx-auto text-center relative overflow-hidden group">

            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-72 h-72 rounded-full blur-3xl opacity-10 bg-blue-500"></div>
            </div>

            <div class="relative z-10 mb-6 inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-tr from-blue-500/10 to-purple-500/10 border border-blue-500/20 text-blue-400 transition-all duration-500 group-hover:scale-110">
                <i data-lucide="message-square" class="w-10 h-10"></i>
            </div>

            <h2 class="section-title mb-4" data-i18n="contact_title"></h2>

            <div class="w-20 h-1 mx-auto rounded-full mb-6" style="background:linear-gradient(to right,#3b82f6,#8b5cf6);"></div>

            <p class="opacity-60 mb-10 max-w-xl mx-auto leading-relaxed" data-i18n="contact_subtitle"></p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">

                <a href="mailto:eisa.haider@outlook.com"
                   data-i18n-url="contact_email"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="mail" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_email"></span>
                </a>

                <a href="https://wa.me/96566686499"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_whatsapp"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="phone" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_whatsapp"></span>
                </a>

                <a href="https://www.linkedin.com/in/eisa-haider"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_linkedin"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="briefcase" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_linkedin"></span>
                </a>

                <a href="https://github.com/EisaHaider"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_github"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="code" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_github"></span>
                </a>

            </div>

        </div>

    </section>

<section id="platform" class="container-custom px-6 pb-20 pt-6">

    <div class="border-t opacity-10 mb-10" style="border-color:var(--border-color);"></div>

    <div class="max-w-5xl mx-auto">

        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5 mb-8">
            <div>
                <span class="text-[11px] uppercase tracking-[0.24em] opacity-45 block mb-3"
                      data-i18n="platform_label"></span>

                <h2 class="text-2xl sm:text-3xl font-bold tracking-tight opacity-95"
                    data-i18n="platform_title"></h2>
            </div>

            <p class="max-w-xl text-sm sm:text-base leading-relaxed opacity-60"
               data-i18n="platform_desc"></p>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">

            <div class="group rounded-xl border p-5 bg-white/[0.025] hover:bg-white/[0.05] transition-all"
                 style="border-color:var(--border-color);">
                <div class="w-10 h-10 rounded-lg border flex items-center justify-center mb-5 bg-white/[0.035]"
                     style="border-color:var(--border-color);">
                    <i data-lucide="server" class="w-5 h-5 opacity-80"></i>
                </div>

                <h3 class="text-sm font-bold mb-2">Python & Flask</h3>
                <p class="text-xs leading-relaxed opacity-55" data-i18n="tech_backend"></p>
            </div>

            <div class="group rounded-xl border p-5 bg-white/[0.025] hover:bg-white/[0.05] transition-all"
                 style="border-color:var(--border-color);">
                <div class="w-10 h-10 rounded-lg border flex items-center justify-center mb-5 bg-white/[0.035]"
                     style="border-color:var(--border-color);">
                    <i data-lucide="layout-template" class="w-5 h-5 opacity-80"></i>
                </div>

                <h3 class="text-sm font-bold mb-2">Tailwind CSS</h3>
                <p class="text-xs leading-relaxed opacity-55" data-i18n="tech_frontend"></p>
            </div>

            <div class="group rounded-xl border p-5 bg-white/[0.025] hover:bg-white/[0.05] transition-all"
                 style="border-color:var(--border-color);">
                <div class="w-10 h-10 rounded-lg border flex items-center justify-center mb-5 bg-white/[0.035]"
                     style="border-color:var(--border-color);">
                    <i data-lucide="mouse-pointer-click" class="w-5 h-5 opacity-80"></i>
                </div>

                <h3 class="text-sm font-bold mb-2">JavaScript</h3>
                <p class="text-xs leading-relaxed opacity-55" data-i18n="tech_interactivity"></p>
            </div>

            <div class="group rounded-xl border p-5 bg-white/[0.025] hover:bg-white/[0.05] transition-all"
                 style="border-color:var(--border-color);">
                <div class="w-10 h-10 rounded-lg border flex items-center justify-center mb-5 bg-white/[0.035]"
                     style="border-color:var(--border-color);">
                    <i data-lucide="cloud" class="w-5 h-5 opacity-80"></i>
                </div>

                <h3 class="text-sm font-bold mb-2">Google Cloud Run</h3>
                <p class="text-xs leading-relaxed opacity-55" data-i18n="tech_hosting"></p>
            </div>

        </div>

    </div>

</section>

    <footer class="py-8 text-center text-sm opacity-50" data-i18n="copyright_text">
    
</footer>

</div>

{% endblock %}
