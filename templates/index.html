{% extends "base.html" %}

{% block title %}
Eisa Haider | Information Systems Architect
{% endblock %}

{% block content %}

<div class="min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur border-b"
         style="background:var(--bg-primary);border-color:var(--border-color);">

        <div class="container-custom px-6">

            <div class="flex items-center justify-between h-20">

                <a href="#" class="text-xl font-bold hover:opacity-80 transition-opacity">
                    Eisa Haider
                </a>

                <div class="hidden md:flex items-center gap-8">

                    <a href="#profile" data-i18n="nav_profile"></a>

                    <a href="#projects" data-i18n="nav_projects"></a>

                    <a href="#domains" data-i18n="nav_domains"></a>

                    <a href="#insights" data-i18n="nav_insights"></a>

                    <a href="#contact" data-i18n="nav_contact"></a>

                </div>

                <div class="flex items-center gap-3">

                    <button id="language-toggle" class="px-4 py-2 rounded-xl border" data-i18n="language_button">
                    </button>

                    <button id="theme-toggle" class="px-4 py-2 rounded-xl border">
                        ☀︎ / 🌙
                    </button>

                </div>

            </div>

        </div>

    </nav>

    <section class="container-custom px-6">

        <div class="grid lg:grid-cols-2 gap-16 min-h-[85vh] items-center">

            <div class="fade-up">

                <p class="uppercase tracking-[0.3em] opacity-60 mb-5" data-i18n="hero_title"></p>

                <h1 class="text-5xl lg:text-7xl font-bold mb-8">
                    Eisa Haider
                </h1>

                <p class="text-xl max-w-2xl opacity-80 leading-relaxed" data-i18n="hero_text"></p>

                <div class="flex gap-4 mt-10 flex-wrap">

                    <a href="#profile" data-i18n="btn_profile" class="px-6 py-3 rounded-xl bg-white text-slate-900"></a>

                    <a href="#projects" data-i18n="btn_projects" class="px-6 py-3 rounded-xl border"></a>

                </div>

            </div>

            <div class="fade-up">

                <div class="card p-8">

                    <h2 class="text-2xl font-bold mb-8" data-i18n="domains_title"></h2>

                    <div class="grid gap-4">

                        <div class="card p-4" data-i18n="domain_1"></div>

                        <div class="card p-4" data-i18n="domain_2"></div>

                        <div class="card p-4" data-i18n="domain_3"></div>

                        <div class="card p-4" data-i18n="domain_4"></div>

                        <div class="card p-4" data-i18n="domain_5"></div>

                        <div class="card p-4" data-i18n="domain_6"></div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <section id="profile" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-6" data-i18n="summary_title"></h2>
        
        <p class="text-lg opacity-70 max-w-3xl leading-relaxed mb-10" data-i18n="summary_description"></p>

        <div class="grid md:grid-cols-4 gap-6">

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_years_systems_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_years_systems_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_years_blog_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_years_blog_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_flask_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_flask_text"></div>
            </div>

            <div class="card p-8">
                <div class="text-4xl font-bold" data-i18n="stat_enterprise_num"></div>
                <div class="mt-2 opacity-70" data-i18n="stat_enterprise_text"></div>
            </div>

        </div>

    </section>

    <section id="projects" class="container-custom px-6 section-spacing">

            <h2 class="section-title mb-10" data-i18n="projects_title"></h2>

            <div class="grid md:grid-cols-2 gap-6">

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_1_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_1_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_2_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_2_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_3_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_3_desc"></p>
                    </div>
                </div>

                <div class="card p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3" data-i18n="project_4_title"></h3>
                        <p class="text-base opacity-70 leading-relaxed mb-4" data-i18n="project_4_desc"></p>
                    </div>
                </div>

            </div>

        </section>

    <section id="domains" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-10" data-i18n="domains_title"></h2>

        <div class="grid md:grid-cols-3 gap-6">

            <div class="card p-8" data-i18n="domain_1"></div>

            <div class="card p-8" data-i18n="domain_4"></div>

            <div class="card p-8" data-i18n="domain_2"></div>

            <div class="card p-8" data-i18n="domain_5"></div>

            <div class="card p-8" data-i18n="domain_3"></div>

            <div class="card p-8" data-i18n="domain_6"></div>

        </div>

    </section>

    <section id="insights" class="container-custom px-6 section-spacing">

        <h2 class="section-title mb-10" data-i18n="insights_title"></h2>

        <div class="grid md:grid-cols-4 gap-6">

            <div class="card p-6" data-i18n="insight_1"></div>

            <div class="card p-6" data-i18n="insight_2"></div>

            <div class="card p-6" data-i18n="insight_3"></div>

            <div class="card p-6" data-i18n="insight_4"></div>

        </div>

    </section>


    
    <section id="contact" class="container-custom px-6 section-spacing">

        <div class="card p-10 md:p-12 max-w-4xl mx-auto text-center relative overflow-hidden group">

            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-72 h-72 rounded-full blur-3xl opacity-10 bg-blue-500"></div>
            </div>

            <div class="relative z-10 mb-6 inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-tr from-blue-500/10 to-purple-500/10 border border-blue-500/20 text-blue-400 transition-all duration-500 group-hover:scale-110">
                <i data-lucide="message-square" class="w-10 h-10"></i>
            </div>

            <h2 class="section-title mb-4" data-i18n="contact_title"></h2>

            <div class="w-20 h-1 mx-auto rounded-full mb-6" style="background:linear-gradient(to right,#3b82f6,#8b5cf6);"></div>

            <p class="opacity-60 mb-10 max-w-xl mx-auto leading-relaxed" data-i18n="contact_subtitle"></p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">

                <a href="mailto:eisa.haider@outlook.com"
                   data-i18n-url="contact_email"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="mail" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_email"></span>
                </a>

                <a href="https://wa.me/96566686499"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_whatsapp"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="phone" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_whatsapp"></span>
                </a>

                <a href="https://www.linkedin.com/in/eisa-haider"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_linkedin"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="briefcase" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_linkedin"></span>
                </a>

                <a href="https://github.com/EisaHaider"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-i18n-url="contact_github"
                   class="card p-5 flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-all duration-300">
                    <i data-lucide="code" class="w-6 h-6 mb-3 opacity-80"></i>
                    <span class="font-medium" data-i18n="contact_github"></span>
                </a>

            </div>

        </div>

    </section>

<section id="platform" class="container-custom px-6 pb-16 pt-6">

        <div class="border-t opacity-10 mb-12" style="border-color:var(--border-color);"></div>

        <div class="text-center max-w-2xl mx-auto mb-12">
            <h2 class="text-3xl font-bold mb-3">Platform Architecture</h2>
            <p class="text-base opacity-60 leading-relaxed" data-i18n="platform_subtitle"></p>
        </div>

        <div class="card p-8 max-w-6xl mx-auto">
            <div class="grid md:grid-cols-5 gap-8">

                <div class="text-center">
                    <div class="mb-4">
                        <i data-lucide="server" class="w-8 h-8 mx-auto opacity-70"></i>
                    </div>
                    <h3 class="font-semibold mb-2">Python & Flask</h3>
                    <p class="text-sm opacity-60" data-i18n="tech_backend"></p>
                </div>

                <div class="text-center">
                    <div class="mb-4">
                        <i data-lucide="palette" class="w-8 h-8 mx-auto opacity-70"></i>
                    </div>
                    <h3 class="font-semibold mb-2">Tailwind CSS</h3>
                    <p class="text-sm opacity-60" data-i18n="tech_frontend"></p>
                </div>

                <div class="text-center">
                    <div class="mb-4">
                        <i data-lucide="sparkles" class="w-8 h-8 mx-auto opacity-70"></i>
                    </div>
                    <h3 class="font-semibold mb-2">JavaScript</h3>
                    <p class="text-sm opacity-60" data-i18n="tech_interactivity"></p>
                </div>

                <div class="text-center">
                    <div class="mb-4">
                        <i data-lucide="git-branch" class="w-8 h-8 mx-auto opacity-70"></i>
                    </div>
                    <h3 class="font-semibold mb-2">Git & GitHub</h3>
                    <p class="text-sm opacity-60" data-i18n="tech_version"></p>
                </div>

                <div class="text-center">
                    <div class="mb-4">
                        <i data-lucide="cloud" class="w-8 h-8 mx-auto opacity-70"></i>
                    </div>
                    <h3 class="font-semibold mb-2">Google Cloud Run</h3>
                    <p class="text-sm opacity-60" data-i18n="tech_hosting"></p>
                </div>

            </div>
        </div>

    </section>

</div>

{% endblock %}
